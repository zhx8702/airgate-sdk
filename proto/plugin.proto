syntax = "proto3";

package airgate.plugin.v1;

option go_package = "github.com/DouDOU-start/airgate-sdk/proto";

// ==================== 插件基础服务 ====================

service PluginService {
    rpc GetInfo(Empty) returns (PluginInfoResponse);
    rpc Init(InitRequest) returns (Empty);
    rpc Start(Empty) returns (Empty);
    rpc Stop(Empty) returns (Empty);
    // 获取插件的前端静态资源
    rpc GetWebAssets(Empty) returns (WebAssetsResponse);
}

// ==================== 网关服务 ====================

service GatewayService {
    rpc GetPlatform(Empty) returns (StringResponse);
    rpc GetModels(Empty) returns (ModelsResponse);
    rpc GetRoutes(Empty) returns (RoutesResponse);
    rpc Forward(ForwardRequest) returns (ForwardResult);
    rpc ForwardStream(ForwardRequest) returns (stream ForwardChunk);
    rpc ValidateAccount(CredentialsRequest) returns (Empty);
    rpc QueryQuota(CredentialsRequest) returns (QuotaInfoResponse);
    // WebSocket 双向流
    rpc HandleWebSocket(stream WebSocketFrame) returns (stream WebSocketFrame);
}

// ==================== 扩展服务 ====================

service ExtensionService {
    rpc Migrate(Empty) returns (Empty);
    rpc GetBackgroundTasks(Empty) returns (BackgroundTasksResponse);
    // HTTP 请求由核心代理到插件
    rpc HandleRequest(HttpRequest) returns (HttpResponse);
    rpc HandleStreamRequest(HttpRequest) returns (stream HttpResponseChunk);
}

// ==================== 通用消息 ====================

message Empty {}

message StringResponse {
    string value = 1;
}

// ==================== 插件信息 ====================

message PluginInfoResponse {
    string id = 1;
    string name = 2;
    string version = 3;
    string description = 4;
    string author = 5;
    string type = 6;
    repeated AccountTypeProto account_types = 7;
    repeated FrontendPageProto frontend_pages = 8;
    repeated FrontendWidgetProto frontend_widgets = 9;
}

message AccountTypeProto {
    string key = 1;
    string label = 2;
    string description = 3;
    repeated CredentialFieldProto fields = 4;
}

message CredentialFieldProto {
    string key = 1;
    string label = 2;
    string type = 3;
    bool   required = 4;
    string placeholder = 5;
}

message FrontendPageProto {
    string path = 1;
    string title = 2;
    string icon = 3;
    string description = 4;
}

message FrontendWidgetProto {
    string slot = 1;
    string entry_file = 2;
    string title = 3;
}

message InitRequest {
    map<string, string> config = 1;
    string log_level = 2;
}

// ==================== 网关消息 ====================

message ModelInfoProto {
    string id = 1;
    string name = 2;
    int32  max_tokens = 3;
    double input_price = 4;
    double output_price = 5;
    double cache_price = 6;
}

message ModelsResponse {
    repeated ModelInfoProto models = 1;
}

message RouteDefinitionProto {
    string method = 1;
    string path = 2;
    string description = 3;
}

message RoutesResponse {
    repeated RouteDefinitionProto routes = 1;
}

message ForwardRequest {
    int64  account_id = 1;
    string account_name = 2;
    string account_platform = 3;
    string account_type = 4;
    bytes  credentials_json = 5;
    string proxy_url = 6;
    bytes  body = 7;
    map<string, string> headers = 8;
    string model = 9;
    bool   stream = 10;
}

message ForwardResult {
    int32  status_code = 1;
    int32  input_tokens = 2;
    int32  output_tokens = 3;
    int32  cache_tokens = 4;
    string model = 5;
    int64  duration_ms = 6;
    string account_status = 7;   // "" / "rate_limited" / "disabled" / "expired"
    int64  retry_after_ms = 8;   // 限流时建议等待时间（毫秒）
    // 流式响应的元信息
    bytes  response_body = 9;
    map<string, string> response_headers = 10;
}

message ForwardChunk {
    bytes data = 1;
    bool  done = 2;
    ForwardResult final_result = 3;
}

message CredentialsRequest {
    map<string, string> credentials = 1;
}

message QuotaInfoResponse {
    double total = 1;
    double used = 2;
    double remaining = 3;
    string currency = 4;
    string expires_at = 5;
    map<string, string> extra = 6;
}

// ==================== HTTP 代理消息 ====================

message HttpRequest {
    string method = 1;
    string path = 2;
    string query = 3;
    map<string, string> headers = 4;
    bytes  body = 5;
    string remote_addr = 6;
}

message HttpResponse {
    int32  status_code = 1;
    map<string, string> headers = 2;
    bytes  body = 3;
}

message HttpResponseChunk {
    bytes data = 1;
    bool  done = 2;
    int32 status_code = 3;
    map<string, string> headers = 4;
}

// ==================== 扩展消息 ====================

message BackgroundTaskProto {
    string name = 1;
    int64  interval_ms = 2;
}

message BackgroundTasksResponse {
    repeated BackgroundTaskProto tasks = 1;
}

// ==================== WebSocket 消息 ====================

message WebSocketFrame {
    enum FrameType {
        CONNECT = 0;   // 连接建立，携带元信息（仅第一帧）
        TEXT    = 1;   // 文本消息
        BINARY  = 2;   // 二进制消息
        CLOSE   = 3;   // 关闭连接
        RESULT  = 4;   // 连接结束，携带 ForwardResult
    }

    FrameType type = 1;
    bytes     data = 2;

    // 仅 CONNECT 帧使用
    WebSocketConnectInfo connect_info = 3;

    // 仅 CLOSE 帧使用
    int32  close_code   = 4;
    string close_reason = 5;

    // 仅 RESULT 帧使用
    ForwardResult result = 6;
}

message WebSocketConnectInfo {
    string path  = 1;
    string query = 2;
    map<string, string> headers = 3;
    string remote_addr    = 4;
    string connection_id  = 5;
    // 核心已调度的账户信息
    int64  account_id       = 6;
    string account_name     = 7;
    string account_platform = 8;
    string account_type     = 9;
    bytes  credentials_json = 10;
    string proxy_url        = 11;
}

// ==================== 前端资源 ====================

message WebAssetFile {
    string path = 1;
    bytes content = 2;
}

message WebAssetsResponse {
    repeated WebAssetFile files = 1;
    bool has_assets = 2;
}
